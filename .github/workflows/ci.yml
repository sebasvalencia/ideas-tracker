name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend: lint + migrate + test ────────────────────────────────────────
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ideas_tracker
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ideas_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ideas_tracker
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'change_me_ci_only' }}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "30"
      JWT_REFRESH_EXPIRE_MINUTES: "10080"
      AUTH_RATE_LIMIT_LOGIN: 5/minute

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Lint
        working-directory: backend
        run: uv run ruff check src tests

      - name: Apply DB migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Run backend unit + bdd with coverage gate
        working-directory: backend
        run: >
          uv run pytest tests/unit tests/bdd
          --cov=src --cov-fail-under=80
          --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          if-no-files-found: warn
          path: |
            backend/coverage.xml
            backend/htmlcov/

  # ── Frontend: lint + unit tests ───────────────────────────────────────────
  frontend-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          if-no-files-found: warn
          path: frontend/coverage/

  # ── E2E smoke (needs both quality jobs to pass first) ─────────────────────
  frontend-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-quality, frontend-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Boot stack
        run: docker compose --profile app up -d --build

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Frontend did not start in time"
          docker compose logs
          exit 1

      - name: Seed database
        run: docker compose exec backend uv run python scripts/seed_dev.py

      - name: Run E2E smoke
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_EMAIL: ${{ secrets.E2E_EMAIL || 'admin@ideas.com' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD || 'ChangeMe123!' }}
        run: npx playwright test tests/e2e/ideas-flow.spec.ts

      - name: Shutdown stack
        if: always()
        run: docker compose down -v

  # ── Publish Docker images (solo en push a main, después de todo el CI) ────
  publish-images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-quality, frontend-unit, frontend-e2e-smoke]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ideas-api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/ideas-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ideas-web:${{ github.sha }}
            ghcr.io/${{ github.repository }}/ideas-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy a producción (solo push a main tras publicar imágenes) ──────────
  # Configurar los siguientes secrets en GitHub → Settings → Secrets:
  #   DEPLOY_HOST      IP o hostname del servidor
  #   DEPLOY_USER      Usuario SSH (ej: ubuntu, deploy)
  #   DEPLOY_SSH_KEY   Clave privada SSH (sin passphrase)
  #   DEPLOY_PATH      Ruta en el servidor (ej: /opt/ideas-tracker)
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [publish-images]
    # Runs only on push AND when DEPLOY_HOST is configured.
    # Skip silently until the server secrets are set up.
    if: github.event_name == 'push'
    environment: production
    steps:
      - name: Check deploy secrets
        id: check-secrets
        run: |
          if [ -n "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::notice::DEPLOY_HOST secret not configured – skipping deploy."
          fi

      - name: Deploy via SSH
        if: steps.check-secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Actualizar imágenes publicadas por publish-images
            docker compose pull

            # Migrar schema + datos de catálogo (idempotente, NUNCA toca usuarios)
            # seed_dev.py NO corre aquí porque APP_ENV=production lo rechaza
            docker compose run --rm backend uv run alembic upgrade head

            # Reiniciar servicios con las nuevas imágenes
            docker compose --profile app up -d --remove-orphans

            # Limpiar imágenes antiguas
            docker image prune -f

            # ── PRIMER DEPLOY ÚNICAMENTE ──────────────────────────────────────
            # Después de hacer el primer deploy, crea el admin con:
            #
            #   docker compose exec backend uv run python scripts/manage_user.py \
            #     create-admin --email tu@email.com --password 'TuPasswordSeguro!'
            #
            # Para cambiar la contraseña después:
            #
            #   docker compose exec backend uv run python scripts/manage_user.py \
            #     reset-password --email tu@email.com --password 'NuevoPassword!'
            # ─────────────────────────────────────────────────────────────────
