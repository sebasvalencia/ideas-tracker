name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ideas_tracker
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ideas_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync
      - name: Run Ruff
        working-directory: backend
        run: uv run ruff check src tests
      - name: Run backend unit + bdd with coverage gate
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ideas_tracker
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY != '' && secrets.JWT_SECRET_KEY || 'change_me_ci_only' }}
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: "30"
          JWT_REFRESH_EXPIRE_MINUTES: "10080"
          AUTH_RATE_LIMIT_LOGIN: 5/minute
        run: >
          uv run pytest tests/unit tests/bdd
          --cov=src --cov-fail-under=80
          --cov-report=xml --cov-report=html --cov-report=term-missing
      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          if-no-files-found: warn
          path: |
            backend/coverage.xml
            backend/htmlcov/

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Run frontend unit tests with coverage
        working-directory: frontend
        run: npm run test:coverage
      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          if-no-files-found: warn
          path: frontend/coverage/

  frontend-e2e-smoke:
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Boot stack
        run: docker compose --profile app up -d --build
      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Frontend did not start in time"
          docker compose logs
          exit 1
      - name: Run E2E smoke
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_EMAIL: ${{ secrets.E2E_EMAIL != '' && secrets.E2E_EMAIL || 'admin@ideas.com' }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD != '' && secrets.E2E_PASSWORD || 'ChangeMe123!' }}
        run: npx playwright test tests/e2e/ideas-flow.spec.ts
      - name: Shutdown stack
        if: always()
        run: docker compose down -v
