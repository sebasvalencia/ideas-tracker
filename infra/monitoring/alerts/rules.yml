groups:
  - name: ideas-api-alerts
    rules:
      - alert: IdeasApiHighErrorRate
        expr: (sum(rate(http_requests_total{status="5xx"}[5m])) / sum(rate(http_requests_total[5m]))) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High error rate in Ideas API
          description: 5xx ratio is above 5% for 5 minutes.

      - alert: IdeasApiHighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: High latency p95 in Ideas API
          description: p95 latency is above 500ms for 10 minutes.

      - alert: IdeasApiDown
        expr: up{job="ideas-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Ideas API target down
          description: Prometheus cannot scrape ideas-api target.
