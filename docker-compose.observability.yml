services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ideas-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alerts/rules.yml:/etc/prometheus/alerts/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: ideas-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:latest
    container_name: ideas-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    container_name: ideas-promtail
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: ideas-otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol/config.yml
    ports:
      - "4318:4318"
      - "4317:4317"
    volumes:
      - ./infra/otel/otel-collector-config.yml:/etc/otelcol/config.yml:ro

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ideas-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4319:4317"

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ideas-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ./infra/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
